name: Unit Tests

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

permissions:
    contents: write

env:
    # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
    BUILD_TYPE: Debug

jobs:
    build:
        name: Build (${{ matrix.os_name }})
        runs-on: ${{ matrix.runs_on }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os_name: ubuntu
                      runs_on: ubuntu-latest
                    - os_name: windows
                      runs_on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install SQLiteCpp (Ubuntu)
              if: matrix.os_name == 'ubuntu'
              run: sudo apt-get install libsqlitecpp-dev gcovr

            - name: Build and Test (Ubuntu)
              if: matrix.os_name == 'ubuntu'
              working-directory: ${{ github.workspace }}
              run: cmake --workflow --preset gcc-debug

            - name: Install SQLiteCpp (Windows vcpkg)
              if: matrix.os_name == 'windows'
              uses: lukka/run-vcpkg@v11
              with:
                  runVcpkgInstall: false

            - name: Install SQLiteCpp (Windows)
              if: matrix.os_name == 'windows'
              shell: pwsh
              run: |
                  & "$env:VCPKG_ROOT/vcpkg.exe" install sqlitecpp:x64-windows

            - name: Configure (Windows)
              if: matrix.os_name == 'windows'
              run: >
                  cmake -S . -B build/windows
                  -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
                  -DHEPCE_BUILD_TESTS=ON
                  -DHEPCE_CALCULATE_COVERAGE=OFF
                  -DHEPCE_BUILD_PYBINDINGS=OFF
                  -DHEPCE_BUILD_BENCH=OFF
                  -DHEPCE_BUILD_WARNINGS=OFF
                  -DHEPCE_INSTALL=OFF
                  -DHEPCE_RUN_OMP=OFF

            - name: Build (Windows)
              if: matrix.os_name == 'windows'
              run: cmake --build build/windows --config Debug

            - name: Test (Windows)
              if: matrix.os_name == 'windows'
              run: ctest --test-dir build/windows -C Debug --output-on-failure

            - name: Generate Coverage Badge JSON
              if: matrix.os_name == 'ubuntu'
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .github/badges

                  gcovr --txt-summary | tee coverage-summary.txt
                  coverage_pct=$(awk '/^lines:/{print $2}' coverage-summary.txt)
                  coverage_num=${coverage_pct%%%}

                  color=$(awk -v n="$coverage_num" 'BEGIN {
                    if (n >= 90) print "brightgreen";
                    else if (n >= 80) print "green";
                    else if (n >= 70) print "yellow";
                    else if (n >= 60) print "orange";
                    else print "red";
                  }')

                  cat > .github/badges/coverage.json <<EOF
                  {
                    "schemaVersion": 1,
                    "label": "Testing:",
                    "message": "${coverage_pct}",
                    "color": "${color}"
                  }
                  EOF

            - name: Publish Coverage Badge JSON
              if: matrix.os_name == 'ubuntu' && github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_branch: gh-pages
                  publish_dir: .github/badges
                  destination_dir: badges
                  keep_files: true
